; =========================================================================================
; MORandomizer (心灵终结 3.3.6 武器随机化引擎) 配置文件
; =========================================================================================
; 提示：
; 模糊查杀与精准黑名单均不区分大小写。
; =========================================================================================

[Settings]
; ========================================================
; 1. 基础调试设置 (Basic Settings)
; ========================================================
; 是否开启调试提示音 (yes/no)
EnableBeep=yes
; 开启调试黑匣子，生成 MORandomizer_Debug.log (排查报错弹窗专用)
EnableDebugLog=yes

; ========================================================
; 2. 组合键修饰开关 (Modifier Keys)
; 注意：切勿在此区域的等号或数值后添加任何行内注释！
; ========================================================
; 设为 yes，代表触发功能时必须按住 Ctrl 键
RequireCtrl=yes
; 设为 yes，代表触发功能时必须按住 Shift 键
RequireShift=yes
; 设为 yes，代表触发功能时必须按住 Alt 键
RequireAlt=no

; ========================================================
; 3. 核心触发按键绑定 (Hotkeys)
; ========================================================
; 全局同级洗牌 (步兵抽步兵，载具抽载具)
KeyRandomWeapons=W
; 全图跨物种大乱炖 (极度高危！平民/建筑慎用)
KeyChaosMode=C
; 局部精准洗牌 (仅针对当前鼠标绿框选中的单位进行发牌)
KeySelectedRandom=S
; 状态开关 (控制 S 键是【同级洗牌】还是【跨物种大杂烩】)
KeyToggleChaos=E
; 一键恢复原厂武器图纸
KeyRestore=R

; ========================================================
; 4. 洗牌范围与高危控制 (Scope Control)
; ========================================================
; 是否允许步兵参与随机化
RandomizeInfantry=yes
; 是否允许载具（含海军）参与随机化
RandomizeUnits=yes
; 是否允许空军参与随机化 (高危：飞行器换枪易导致寻路坠毁)
RandomizeAircraft=yes
; 是否允许防御建筑参与随机化
RandomizeBuildings=yes

; ⚠️ 建筑跨物种大乱炖开关 (极度高危选项！)
; 设为 yes：建筑将参与全图跨物种大乱炖（极易因为找不到炮塔/骨骼动画而导致 IE 闪退！）
; 设为 no （强烈推荐）：开启大乱炖时，建筑依旧只在“建筑专属安全池”里洗牌，其他军种依然群魔乱舞。
IncludeBuildingsInChaos=no


